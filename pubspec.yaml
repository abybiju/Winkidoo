name: winkidoo
description: Winkidoo — AI-powered couples surprise vault. Convince the judge, unlock the love.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.8.0
  google_generative_ai: ^0.4.6
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  encrypt: ^5.0.3
  uuid: ^4.5.1
  lottie: ^3.1.2
  confetti: ^0.7.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.0.7
  record: ^5.0.4
  audioplayers: ^6.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
