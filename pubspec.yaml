name: winkidoo
description: Winkidoo — AI-powered couples surprise vault. Convince the judge, unlock the love.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.8.0
  google_generative_ai: ^0.4.6
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  encrypt: ^5.0.3
  uuid: ^4.5.1
  lottie: ^3.1.2
  confetti: ^0.8.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.0.7
  record: ^6.0.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  go_router: ^17.1.0
  app_links: ^6.4.1
  share_plus: ^12.0.1
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  phosphor_flutter: ^2.1.0
  animations: ^2.0.11
  home_widget: ^0.7.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.11
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/sounds/
