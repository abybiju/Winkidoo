<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Winkidoo — AI Couples Surprise Game</title>
  <meta name="description" content="Hide a surprise. Convince the judge. Unlock the love. Download Winkidoo on Android."/>
  <style>
    :root {
      --bg: #0D0A1A; --accent: #F97316; --text: #E8E4F0; --muted: #9590A8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .container { max-width: 480px; }
    .logo {
      width: 80px; height: 80px; background: var(--accent); border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; color: white; margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(249,115,22,0.4);
    }
    h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6; }
    .cta {
      background: var(--accent); color: white; font-size: 1rem; font-weight: 700;
      padding: 0.9rem 2rem; border-radius: 50px; text-decoration: none;
      display: inline-block; margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
    }
    .links { margin-top: 2rem; font-size: 0.85rem; color: var(--muted); }
    .links a { color: var(--muted); text-decoration: underline; margin: 0 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">W</div>
    <h1>Winkidoo</h1>
    <p>Hide a surprise. Convince the AI judge. Unlock the love.<br/>The couples game where every battle matters.</p>
    <a class="cta" href="https://play.google.com/store/apps/details?id=com.winkidoo.winkidoo">
      Download on Google Play
    </a>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="mailto:support@winkidoo.app">Contact</a>
    </div>
  </div>
</body>
</html>
